<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAI - Configuratore Radiatori</title>
    
    <!-- Font e Icone -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* --- STILI GLOBALI (replicati dall'esempio) --- */
        :root {
            --primary-color: #005A9C;
            --primary-light: #e3f2fd;
            --bg-main: #f4f7f9;
            --bg-card: #ffffff;
            --text-dark: #333;
            --text-muted: #6c757d;
            --border-color: #e9ecef;
            --radius: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            margin: 0; 
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }
        .hidden { display: none !important; }

        /* --- LOADER E LOGIN (Stili coerenti) --- */
        #loader, #login-section {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            background-color: var(--bg-main);
        }
        .login-card {
            background: var(--bg-card); padding: 2.5rem;
            border-radius: var(--radius); box-shadow: var(--shadow);
            width: 420px; text-align: center;
        }
        .login-logo { max-width: 180px; margin-bottom: 2rem; }

        /* --- LAYOUT DASHBOARD (esatto come da screenshot) --- */
        .dashboard-wrapper { display: flex; min-height: 100vh; }
        
        /* Sidebar Bianca */
        .sidebar {
            width: 280px; background-color: var(--bg-card);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; flex-shrink: 0;
            position: sticky; top: 0; height: 100vh;
        }
        .sidebar-header {
            padding: 1.5rem; border-bottom: 1px solid var(--border-color);
            text-align: center;
        }
        .sidebar-header img { max-width: 180px; }
        .sidebar-menu { list-style: none; padding: 1rem 0; margin: 0; flex-grow: 1; }
        .sidebar-menu li a {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.9rem 1.5rem; color: #555; text-decoration: none;
            font-weight: 500; font-size: 0.95rem;
        }
        .sidebar-menu li a:hover { background-color: #f8f9fa; }
        .sidebar-menu li.active a {
            background-color: var(--primary-light); color: var(--primary-color);
            border-right: 4px solid var(--primary-color); font-weight: 700;
        }
        .sidebar-menu i.fa-solid { margin-right: 12px; width: 20px; text-align: center; }
        .sidebar-footer { padding: 1.5rem; text-align: center; font-size: 0.8rem; color: var(--text-muted); }

        /* Main Content */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        
        /* Header Superiore */
        .app-header {
            background: var(--bg-card); padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); flex-shrink: 0;
        }
        .page-title { margin: 0; font-size: 1.5rem; font-weight: 600; }
        .user-profile { display: flex; align-items: center; gap: 1rem; }
        .user-profile span { font-weight: 500; }
        .user-icon { font-size: 1.5rem; color: var(--text-muted); cursor: pointer; }

        /* Contenitore Principale */
        .content-container { padding: 2rem; }
        .dashboard-card {
            background: var(--bg-card); padding: 2rem;
            border-radius: var(--radius); box-shadow: var(--shadow);
        }

        /* --- STILI SPECIFICI DEL CONFIGURATORE --- */
        .config-grid { display: grid; grid-template-columns: 450px 1fr; gap: 2rem; }
        
        .card-title {
            font-size: 1.1rem; font-weight: 600; color: var(--primary-color);
            margin: 0 0 1.5rem 0; padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary-color);
            display: flex; align-items: center; gap: 10px;
        }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem; color: #444; }
        .form-control {
            width: 100%; padding: 0.75rem; border: 1px solid #ccc;
            border-radius: 6px; font-size: 1rem; transition: 0.2s;
        }
        .form-control:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(0,90,156,0.1); }
        
        .btn-submit {
            width: 100%; padding: 0.8rem; background: var(--primary-color); color: #fff;
            border: none; border-radius: 6px; font-weight: 600; cursor: pointer;
            font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s; margin-top: 1rem;
        }
        .btn-submit:hover { background: var(--primary-dark); }

        /* Risultati a Destra */
        #empty-state-view { text-align: center; padding: 4rem; color: var(--text-muted); }
        #empty-state-view .icon { font-size: 4rem; opacity: 0.2; margin-bottom: 1.5rem; }
        
        #results-view { display: none; } /* Verrà mostrato da JS */
        #room-cards-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .room-result-card {
            background: #f8f9fa; border: 1px solid var(--border-color); padding: 1rem;
            border-radius: var(--radius); position: relative;
        }
        .room-result-card h4 { margin: 0 0 0.5rem 0; font-size: 1.1rem; }
        .room-result-card .meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; }
        .room-result-card .result-line { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 0.4rem 0; border-bottom: 1px solid var(--border-color); }
        .room-result-card .result-line:last-child { border: none; }
        .room-result-card .total-watt { font-size: 1.2rem; font-weight: 700; color: var(--primary-color); text-align: center; margin-top: 1rem; }
        .remove-btn { position: absolute; top: 10px; right: 10px; cursor: pointer; color: #dc3545; }
    </style>
</head>
<body>

    <div id="loader">...Caricamento</div>

    <section id="login-section" class="hidden">
        <div class="login-card">
            <img src="https://raw.githubusercontent.com/SevenUp88/sito-cai-ufficio-tecnico/main/LOGO%20CAI_.png" class="login-logo">
            <form id="login-form">
                <div class="form-group" style="text-align: left;"><label>Email</label><input type="email" id="email" class="form-control" required></div>
                <div class="form-group" style="text-align: left;"><label>Password</label><input type="password" id="password" class="form-control" required></div>
                <button type="submit" class="btn-submit" style="width: 100%;">Accedi</button>
            </form>
        </div>
    </section>

    <div id="app-content" class="dashboard-wrapper hidden">
        <nav class="sidebar">
            <div class="sidebar-header">
                <img src="https://raw.githubusercontent.com/SevenUp88/sito-cai-ufficio-tecnico/main/LOGO%20CAI_.png" alt="Logo CAI">
            </div>
            <ul class="sidebar-menu">
                <li><a href="#"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
                <li><a href="#"><i class="fa-solid fa-truck"></i> Noleggi <i class="fa-solid fa-chevron-right"></i></a></li>
                <li><a href="#"><i class="fa-solid fa-file-invoice"></i> Preventivazione</a></li>
                <li class="active"><a href="#"><i class="fa-solid fa-calculator"></i> Configuratori <i class="fa-solid fa-chevron-right"></i></a></li>
                <li><a href="#"><i class="fa-solid fa-calendar-alt"></i> Agenda Consegne</a></li>
            </ul>
            <div class="sidebar-footer">&copy; 2025 CAI Solutions</div>
        </nav>

        <main class="main-content">
            <header class="app-header">
                <h1 class="page-title">Configuratore Fabbisogno Termico</h1>
                <div class="user-profile">
                    <span id="user-email-display"></span>
                    <i class="fa-solid fa-user-circle user-icon"></i>
                </div>
            </header>

            <div class="content-container">
                <div class="dashboard-card">
                    <div class="config-grid">
                        
                        <!-- Colonna Sinistra: Input Form -->
                        <div>
                            <h3 class="card-title"><i class="fa-solid fa-plus-circle"></i> Nuova Stanza</h3>
                            <div class="form-group">
                                <label for="room-type">Nome Ambiente</label>
                                <select id="room-type" class="form-control">
                                    <option value="Soggiorno">Soggiorno</option>
                                    <option value="Cucina">Cucina</option>
                                    <option value="Camera da letto">Camera da letto</option>
                                    <option value="Bagno">Bagno</option>
                                    <option value="Studio">Studio</option>
                                </select>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div class="form-group"><label for="sqm">Superficie (mq)</label><input type="number" id="sqm" class="form-control" placeholder="20"></div>
                                <div class="form-group"><label for="height">Altezza (m)</label><input type="number" id="height" class="form-control" value="2.70" step="0.10"></div>
                            </div>
                            <div class="form-group">
                                <label for="insulation">Efficienza Edificio (Watt/mc)</label>
                                <select id="insulation" class="form-control">
                                    <option value="30">Buon Isolamento (30W/mc)</option>
                                    <option value="40" selected>Isolamento Medio (40W/mc)</option>
                                    <option value="55">Scarso Isolamento (55W/mc)</option>
                                </select>
                            </div>

                            <h3 class="card-title" style="margin-top: 2.5rem;"><i class="fa-solid fa-ruler-combined"></i> Modello Radiatore IRSAP</h3>
                            <div class="form-group">
                                <label for="tesi-model">Modello Tesi</label>
                                <select id="tesi-model" class="form-control">
                                    <option value="TESI 2">TESI 2 (2 Colonne)</option>
                                    <option value="TESI 3" selected>TESI 3 (3 Colonne)</option>
                                    <option value="TESI 4">TESI 4 (4 Colonne)</option>
                                    <option value="TESI 5">TESI 5 (5 Colonne)</option>
                                    <option value="TESI 6">TESI 6 (6 Colonne)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="radiator-h">Altezza Radiatore</label>
                                <select id="radiator-h" class="form-control"></select>
                            </div>
                            <button id="add-room-btn" class="btn-submit">Aggiungi Stanza <i class="fa-solid fa-arrow-right"></i></button>
                        </div>
                        
                        <!-- Colonna Destra: Risultati -->
                        <div>
                            <h3 class="card-title"><i class="fa-solid fa-layer-group"></i> Riepilogo Progetto</h3>
                            <div id="empty-state-view">
                                <div class="icon"><i class="fa-solid fa-calculator"></i></div>
                                <p>Ancora nessuna stanza aggiunta.<br>Usa il form a sinistra per iniziare.</p>
                            </div>
                            <div id="results-view">
                                <div id="room-cards-list"></div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const firebaseConfig = { apiKey: "AIzaSyC6tvhoIlvIyh8L_jwSVWs_TkXNLKrt540", authDomain: "consorzio-artigiani-idraulici.firebaseapp.com", projectId: "consorzio-artigiani-idraulici" };
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();

            const ui = {
                loader: document.getElementById('loader'),
                loginSection: document.getElementById('login-section'),
                appContent: document.getElementById('app-content'),
                loginForm: document.getElementById('login-form'),
                userEmailDisplay: document.getElementById('user-email-display')
            };

            auth.onAuthStateChanged(user => {
                ui.loader.classList.add('hidden');
                if (user) {
                    ui.appContent.classList.remove('hidden');
                    ui.loginSection.classList.add('hidden');
                    ui.userEmailDisplay.textContent = user.email.split('@')[0]; // Mostra solo il nome
                    runApp();
                } else {
                    ui.appContent.classList.add('hidden');
                    ui.loginSection.classList.remove('hidden');
                }
            });

            ui.loginForm.addEventListener('submit', e => {
                e.preventDefault();
                auth.signInWithEmailAndPassword(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                ).catch(err => alert("Credenziali non valide: " + err.message));
            });
        });

        function runApp() {
            const radiatorCatalog = {
                "TESI 2": [{ id: 5, h: 565, w: 40.9 }, { id: 18, h: 1000, w: 69.2 }, { id: 22, h: 1800, w: 124.3 }],
                "TESI 3": [{ id: 32, h: 565, w: 57.4 }, { id: 45, h: 1000, w: 96.8 }, { id: 49, h: 1800, w: 168.9 }],
                "TESI 4": [{ id: 59, h: 565, w: 74.8 }, { id: 72, h: 1000, w: 125.9 }, { id: 76, h: 1800, w: 216.0 }],
                "TESI 5": [{ id: 86, h: 565, w: 90.8 }, { id: 95, h: 1000, w: 152.4 }, { id: 98, h: 1800, w: 261.3 }],
                "TESI 6": [{ id: 106, h: 565, w: 106.9 }, { id: 115, h: 1000, w: 178.9 }, { id: 118, h: 1800, w: 306.5 }]
            };
            let projectRooms = [];

            const modelSelect = document.getElementById('tesi-model');
            const hSelect = document.getElementById('radiator-h');

            const updateHeights = () => {
                const model = modelSelect.value;
                hSelect.innerHTML = radiatorCatalog[model]
                    .map(item => `<option value="${item.id}">${item.h} mm</option>`)
                    .join('');
            };

            const addRoom = () => {
                const roomData = {
                    type: document.getElementById('room-type').value,
                    sqm: parseFloat(document.getElementById('sqm').value),
                    h: parseFloat(document.getElementById('height').value),
                    coeff: parseInt(document.getElementById('insulation').value),
                    radiatorModel: document.getElementById('tesi-model').value,
                    radiatorId: parseInt(document.getElementById('radiator-h').value)
                };

                if (!roomData.sqm || !roomData.h) {
                    alert("Inserire superficie e altezza.");
                    return;
                }

                const radiatorSpec = radiatorCatalog[roomData.radiatorModel].find(r => r.id === roomData.radiatorId);
                const demand = Math.ceil(roomData.sqm * roomData.h * roomData.coeff);
                const elements = Math.ceil(demand / radiatorSpec.w);

                projectRooms.push({
                    id: Date.now(),
                    ...roomData,
                    radiatorH: radiatorSpec.h,
                    demand,
                    elements
                });

                renderResults();
                document.getElementById('sqm').value = ''; // Reset for next entry
            };

            const removeRoom = (roomId) => {
                projectRooms = projectRooms.filter(room => room.id !== roomId);
                renderResults();
            };
            
            window.removeRoom = removeRoom; // Make it accessible from HTML onclick

            const renderResults = () => {
                const emptyState = document.getElementById('empty-state-view');
                const resultsView = document.getElementById('results-view');
                const listContainer = document.getElementById('room-cards-list');

                if (projectRooms.length === 0) {
                    emptyState.style.display = 'block';
                    resultsView.style.display = 'none';
                    return;
                }

                emptyState.style.display = 'none';
                resultsView.style.display = 'block';
                listContainer.innerHTML = '';

                projectRooms.forEach(room => {
                    const card = document.createElement('div');
                    card.className = 'room-result-card';
                    card.innerHTML = `
                        <i class="fa-solid fa-times remove-btn" onclick="removeRoom(${room.id})"></i>
                        <h4>${room.type}</h4>
                        <div class="meta">${room.sqm} mq / ${room.radiatorModel} H${room.radiatorH}</div>
                        <div class="result-line">
                            <span>Fabbisogno Termico</span>
                            <strong>${room.demand} W</strong>
                        </div>
                        <div class="result-line">
                            <span>Elementi necessari</span>
                            <strong>${room.elements}</strong>
                        </div>
                    `;
                    listContainer.appendChild(card);
                });
            };
            
            modelSelect.addEventListener('change', updateHeights);
            document.getElementById('add-room-btn').addEventListener('click', addRoom);
            
            // Initial setup
            updateHeights();
            renderResults();
        }
    </script>
</body>
</html>
