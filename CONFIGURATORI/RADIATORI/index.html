<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAI - Configuratore Radiatori</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* CSS Unificato e Corretto - Basato sul tuo file style (1).css */
        :root {
            --primary-color: #0056a8;
            --primary-dark: #004485;
            --accent-red: #d71920;
            --sidebar-width: 260px;
            --header-height: 70px;
            --bg-body: #f4f6f9;
            --text-main: #333;
            --text-muted: #6c757d;
            --white: #ffffff;
            --border-color: #e0e0e0;
            --shadow-soft: 0 2px 10px rgba(0,0,0,0.05);
        }

        html { box-sizing: border-box; }
        *, *::before, *::after { box-sizing: inherit; margin: 0; padding: 0; }

        body { 
            font-family: 'Roboto', 'Segoe UI', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        .loader-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-body); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .loader-spinner {
            border: 4px solid #e9ecef; border-top: 4px solid var(--primary-color);
            border-radius: 50%; width: 50px; height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* SEZIONE LOGIN */
        .login-centered { display: flex; align-items: center; justify-content: center; height: 100vh; width: 100%; }
        .login-card {
            background: var(--white); padding: 40px; border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center;
        }
        .login-logo { max-width: 180px; margin-bottom: 20px; }
        .login-card h2 { color: var(--primary-color); margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9em; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem;
        }
        .btn-login {
            width: 100%; padding: 12px; background-color: var(--primary-color); color: white;
            border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: 500;
        }

        /* LAYOUT DASHBOARD */
        .dashboard-wrapper { display: flex; height: 100vh; width: 100%; }
        .sidebar {
            width: var(--sidebar-width); background-color: var(--white);
            border-right: 1px solid var(--border-color); display: flex; flex-direction: column; flex-shrink: 0;
        }
        .sidebar-brand {
            height: var(--header-height); display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #f0f0f0; padding: 10px;
        }
        .sidebar-brand img { max-height: 50px; width: auto; }
        .sidebar-menu { flex: 1; overflow-y: auto; padding: 20px 0; list-style: none; }
        .nav-link {
            display: flex; align-items: center; justify-content: space-between; padding: 12px 25px;
            color: var(--text-main); text-decoration: none; font-weight: 500; font-size: 0.95rem;
            border-left: 4px solid transparent;
        }
        .nav-link.active, .nav-link:hover {
            background-color: #f0f7ff; color: var(--primary-color); border-left-color: var(--primary-color);
        }
        .nav-link i:first-child { width: 25px; color: var(--text-muted); }
        .nav-link.active i, .nav-link:hover i { color: var(--primary-color); }
        .nav-link span { flex-grow: 1; margin-left: 10px; }
        .sidebar-footer { padding: 15px; text-align: center; font-size: 0.8rem; color: #aaa; }

        .main-content {
            flex-grow: 1; display: flex; flex-direction: column; overflow: hidden;
        }
        .top-bar {
            height: var(--header-height); background-color: var(--white);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; border-bottom: 1px solid var(--border-color); flex-shrink: 0;
        }
        .top-bar h2 { font-size: 1.2rem; font-weight: 600; }
        .user-profile-info { display: flex; align-items: center; gap: 15px; }
        .user-details { text-align: right; line-height: 1.2; }
        .user-email { font-weight: 600; font-size: 0.9rem; color: var(--primary-color); }
        .user-avatar {
            width: 35px; height: 35px; background-color: #e8f0fe; color: var(--primary-color);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .content-container { padding: 30px; overflow-y: auto; flex-grow: 1; }
        .dashboard-card {
            background: var(--white); border-radius: 8px; padding: 30px;
            box-shadow: var(--shadow-soft);
        }
        
        /* STILI SPECIFICI CONFIGURATORE */
        .config-grid { display: grid; grid-template-columns: 450px 1fr; gap: 2rem; }
        .config-title {
            font-size: 1.1rem; font-weight: 600; color: var(--primary-color);
            margin: 0 0 1.5rem 0; padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary-color); display: flex; align-items: center; gap: 10px;
        }
        .btn-add {
            width: 100%; padding: 12px; background-color: var(--primary-color); color: white;
            border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: 500;
        }
        #empty-state-view { text-align: center; padding: 4rem; color: var(--text-muted); border: 2px dashed var(--border-color); border-radius: 8px; }
        #results-view { display: none; }
        #room-cards-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .room-result-card {
            background: #fdfdff; border: 1px solid var(--border-color); padding: 1rem;
            border-radius: 8px; position: relative; box-shadow: var(--shadow-soft);
        }
        .room-result-card h4 { margin: 0 0 0.5rem 0; }
        .room-result-card .meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; }
        .room-result-card .result-line { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 0.4rem 0; border-bottom: 1px solid #f0f0f0; }
        .remove-btn { position: absolute; top: 10px; right: 10px; cursor: pointer; color: var(--accent-red); }
    </style>
</head>
<body>

    <div id="loader" class="loader-container"><div class="loader-spinner"></div></div>

    <section id="login-section" class="hidden login-centered">
        <div class="login-card">
            <img src="https://raw.githubusercontent.com/SevenUp88/sito-cai-ufficio-tecnico/main/LOGO%20CAI_.png" class="login-logo">
            <h2>Accesso Area Riservata</h2>
            <form id="login-form">
                <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
                <button type="submit" class="btn-login">Accedi</button>
            </form>
        </div>
    </section>

    <div id="app-content" class="dashboard-wrapper hidden">
        <nav class="sidebar">
            <div class="sidebar-brand">
                <img src="https://raw.githubusercontent.com/SevenUp88/sito-cai-ufficio-tecnico/main/LOGO%20CAI_.png" alt="Logo CAI">
            </div>
            <ul class="sidebar-menu">
                <li><a href="#" class="nav-link"><i class="fa-solid fa-chart-line"></i> <span>Dashboard</span></a></li>
                <li class="active"><a href="#" class="nav-link active"><i class="fa-solid fa-calculator"></i> <span>Configuratori</span></a></li>
                <li><a href="#" class="nav-link"><i class="fa-solid fa-file-invoice"></i> <span>Preventivazione</span></a></li>
                <li><a href="#" class="nav-link"><i class="fa-solid fa-calendar-alt"></i> <span>Agenda Consegne</span></a></li>
            </ul>
            <div class="sidebar-footer">&copy; 2025 CAI Solutions</div>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <h2>Configuratore Fabbisogno Termico</h2>
                <div class="user-profile-info">
                    <div class="user-details">
                        <span class="welcome-text">Utente</span>
                        <span class="user-email" id="user-email-display"></span>
                    </div>
                    <div class="user-avatar" id="user-avatar"></div>
                </div>
            </header>

            <div class="content-container">
                <div class="dashboard-card">
                    <div class="config-grid">
                        <!-- Colonna Sinistra: Input Form -->
                        <div>
                            <h3 class="config-title"><i class="fa-solid fa-plus-circle"></i> Nuova Stanza</h3>
                            <div class="form-group"><label>Nome Ambiente</label><select id="room-type" class="form-group"><option>Soggiorno</option><option>Cucina</option></select></div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div class="form-group"><label>Superficie (mq)</label><input type="number" id="sqm" class="form-group" placeholder="20"></div>
                                <div class="form-group"><label>Altezza (m)</label><input type="number" id="height" class="form-group" value="2.70"></div>
                            </div>
                            <div class="form-group"><label>Efficienza Edificio</label><select id="insulation" class="form-group"><option value="40">Isolamento Medio (40W/mc)</option></select></div>

                            <h3 class="config-title" style="margin-top: 2rem;"><i class="fa-solid fa-ruler-combined"></i> Modello Radiatore</h3>
                            <div class="form-group"><label>Modello Tesi</label><select id="tesi-model" class="form-group"></select></div>
                            <div class="form-group"><label>Altezza</label><select id="radiator-h" class="form-group"></select></div>
                            <button id="add-room-btn" class="btn-add">Aggiungi Stanza <i class="fa-solid fa-arrow-right"></i></button>
                        </div>
                        <!-- Colonna Destra: Risultati -->
                        <div>
                            <h3 class="config-title"><i class="fa-solid fa-layer-group"></i> Riepilogo Progetto</h3>
                            <div id="empty-state-view"><p>Nessuna stanza aggiunta.</p></div>
                            <div id="results-view"><div id="room-cards-list"></div></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const firebaseConfig = { apiKey: "AIzaSyC6tvhoIlvIyh8L_jwSVWs_TkXNLKrt540", authDomain: "consorzio-artigiani-idraulici.firebaseapp.com", projectId: "consorzio-artigiani-idraulici" };
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();

            auth.onAuthStateChanged(user => {
                document.getElementById('loader').classList.add('hidden');
                const app = document.getElementById('app-content');
                const login = document.getElementById('login-section');
                if (user) {
                    app.classList.remove('hidden');
                    login.classList.add('hidden');
                    document.getElementById('user-email-display').textContent = user.email;
                    document.getElementById('user-avatar').textContent = user.email.charAt(0).toUpperCase();
                    runApp();
                } else {
                    app.classList.add('hidden');
                    login.classList.remove('hidden');
                }
            });

            document.getElementById('login-form').addEventListener('submit', e => {
                e.preventDefault();
                auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
                    .catch(err => alert("Errore: " + err.message));
            });
        });

        function runApp() {
            // Catalogo e dati del configuratore... (il resto del JS rimane invariato)
             const radiatorCatalog = {
                "TESI 2": [{ id: 5, h: 565, w: 40.9 }, { id: 18, h: 1000, w: 69.2 }],
                "TESI 3": [{ id: 32, h: 565, w: 57.4 }, { id: 45, h: 1000, w: 96.8 }],
                "TESI 4": [{ id: 59, h: 565, w: 74.8 }, { id: 72, h: 1000, w: 125.9 }],
                "TESI 5": [{ id: 86, h: 565, w: 90.8 }, { id: 95, h: 1000, w: 152.4 }],
                "TESI 6": [{ id: 106, h: 565, w: 106.9 }, { id: 115, h: 1000, w: 178.9 }]
            };
            let projectRooms = [];

            // Popola i select
            const roomTypeSelect = document.getElementById('room-type');
            roomTypeSelect.innerHTML = ['Soggiorno', 'Cucina', 'Camera', 'Bagno', 'Studio'].map(o => `<option>${o}</option>`).join('');

            const insulationSelect = document.getElementById('insulation');
            insulationSelect.innerHTML = `<option value="30">Buono (30W/mc)</option><option value="40" selected>Medio (40W/mc)</option><option value="55">Scarso (55W/mc)</option>`;

            const modelSelect = document.getElementById('tesi-model');
            modelSelect.innerHTML = Object.keys(radiatorCatalog).map(m => `<option value="${m}">${m} (${m.split(' ')[1]} Colonne)</option>`).join('');

            const hSelect = document.getElementById('radiator-h');
            const updateHeights = () => {
                const model = modelSelect.value;
                hSelect.innerHTML = radiatorCatalog[model].map(item => `<option value="${item.id}">${item.h} mm</option>`).join('');
            };
            
            const addRoom = () => {
                const roomData = {
                    type: roomTypeSelect.value,
                    sqm: parseFloat(document.getElementById('sqm').value),
                    h: parseFloat(document.getElementById('height').value),
                    coeff: parseInt(insulationSelect.value),
                    radiatorModel: modelSelect.value,
                    radiatorId: parseInt(hSelect.value)
                };

                if (!roomData.sqm || !roomData.h) { alert("Inserire superficie e altezza."); return; }

                const spec = radiatorCatalog[roomData.radiatorModel].find(r => r.id === roomData.radiatorId);
                const demand = Math.ceil(roomData.sqm * roomData.h * roomData.coeff);
                const elements = Math.ceil(demand / spec.w);

                projectRooms.push({ id: Date.now(), ...roomData, radiatorH: spec.h, demand, elements });
                renderResults();
                document.getElementById('sqm').value = '';
            };

            const removeRoom = (id) => {
                projectRooms = projectRooms.filter(room => room.id !== id);
                renderResults();
            };
            window.removeRoom = removeRoom; // Espone la funzione globalmente

            const renderResults = () => {
                const empty = document.getElementById('empty-state-view');
                const results = document.getElementById('results-view');
                const list = document.getElementById('room-cards-list');

                if (projectRooms.length === 0) {
                    empty.style.display = 'block';
                    results.style.display = 'none';
                } else {
                    empty.style.display = 'none';
                    results.style.display = 'block';
                    list.innerHTML = projectRooms.map(room => `
                        <div class="room-result-card">
                            <i class="fa-solid fa-times remove-btn" onclick="removeRoom(${room.id})"></i>
                            <h4>${room.type}</h4>
                            <div class="meta">${room.sqm} mq / ${room.radiatorModel} H${room.radiatorH}</div>
                            <div class="result-line"><span>Fabbisogno Termico</span><strong>${room.demand} W</strong></div>
                            <div class="result-line"><span>Elementi necessari</span><strong>${room.elements}</strong></div>
                        </div>
                    `).join('');
                }
            };
            
            modelSelect.addEventListener('change', updateHeights);
            document.getElementById('add-room-btn').addEventListener('click', addRoom);
            
            updateHeights();
            renderResults();
        }
    </script>
</body>
</html>
